name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manuel tetikleme butonu

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sistem bağımlılıklarını kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake ccache \
            libltdl-dev libgdbm-dev libbz2-dev

      - name: Buildozer ve Cython kur
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.3

      - name: Android SDK Önbelleği
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: APK'yı build et
        run: |
          buildozer -v android debug

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Basketbol-APK
          path: bin/*.apk
          retention-days: 30
