name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Ana dosyayı yeniden adlandır (buildozer main.py bekliyor)
        run: cp basketbol_kivy.py main.py

      - name: Kivy Buildozer Action ile APK build et
        uses: kivy/buildozer-action@v1
        id: buildozer
        with:
          filename: buildozer.spec
          buildozer_version: stable

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Basketbol-APK
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30

